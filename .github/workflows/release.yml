name: 🚀 Build & Release (Windows EXE)

on:
  push:
    tags:
      - "v*"          # v1.0, v2.1.3 gibi tag'lerde tetiklenir

  workflow_dispatch:  # Manuel tetikleme (Actions sekmesinden)

permissions:
  contents: write   # Release oluşturmak için gerekli

jobs:
  build-windows:
    name: Build EXE — Windows
    runs-on: windows-latest

    steps:
      # ── 1. Kaynak kodu çek ──────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Python kur ───────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Bağımlılıkları kur ───────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4. PyInstaller build ────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller ausbildung.spec --clean -y

      # ── 5. Kurulum dosyasını kopyala ────────────────────────────
      - name: Copy kurulum.bat into dist
        run: Copy-Item kurulum.bat dist\AusbildungBot\kurulum.bat

      # ── 6. Sürüm notunu oluştur ─────────────────────────────────
      - name: Write release notes helper
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = @"
          ## AusbildungBot $tag

          ### Kurulum
          1. **AusbildungBot-$tag-windows.zip** dosyasını indirin ve bir klasöre çıkartın
          2. ``kurulum.bat`` dosyasını **yönetici olarak** çalıştırın (Chromium tarayıcısını indirir ~150 MB)
          3. ``AusbildungBot.exe`` dosyasını çalıştırın

          ### Gereksinimler
          - Windows 10/11 (64-bit)
          - İnternet bağlantısı
          - [ausbildung.de](https://www.ausbildung.de) hesabı

          ### Önemli
          Botu başlatmadan önce profilinizin **tam ve eksiksiz** olduğundan emin olun.
          CV, ön yazı ve tüm belgeler sisteme yüklü olmalıdır.

          ---
          Powered by [Ubden® Community](https://github.com/ck-cankurt) · [♥ Donate](https://ubd.one/donate)
          "@
          $notes | Out-File -FilePath release_notes.md -Encoding utf8

      # ── 7. ZIP oluştur ──────────────────────────────────────────
      - name: Create ZIP archive
        run: |
          Compress-Archive `
            -Path dist\AusbildungBot `
            -DestinationPath dist\AusbildungBot-${{ github.ref_name }}-windows.zip `
            -Force

      # ── 8. GitHub Release oluştur ve ZIP'i ekle ─────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "AusbildungBot ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            dist/AusbildungBot-${{ github.ref_name }}-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
